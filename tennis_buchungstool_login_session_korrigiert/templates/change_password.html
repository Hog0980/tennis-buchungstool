{% extends "base.html" %}
{% block content %}
<section class="card narrow">
    <h2>Passwort ändern</h2>
    {% if current_user.must_change_password %}
        <div class="notice">Du verwendest noch ein Einmalpasswort. Bitte lege jetzt ein eigenes Passwort fest.</div>
    {% endif %}
    <form method="post" class="form">
        <label for="old_password">Bisheriges Passwort</label>
        <input type="password" id="old_password" name="old_password" required>
        <label for="new_password">Neues Passwort</label>
        <input type="password" id="new_password" name="new_password" minlength="8" required>
        <label for="confirm_password">Neues Passwort wiederholen</label>
        <input type="password" id="confirm_password" name="confirm_password" minlength="8" required>
        <button type="submit">Passwort speichern</button>
    </form>
</section>
{% endblock %}
